<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATE EC 2027 Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">GATE 2027</a>
        <ul>
            <li><a href="index.html" class="active">Dashboard</a></li>
            <li><a href="plan.html">Plan</a></li>
            <li><a href="quiz.html">Quiz & Mistakes</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </nav>

    <main>
        <div class="glass-panel" style="margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <div>
                    <h1 class="text-gradient">Welcome back, Nagateja.</h1>
                    <p id="date-display" style="color: var(--text-secondary);"></p>
                </div>
                <div style="text-align: right;">
                    <h2 style="font-size: 2rem; color: var(--warning-color); margin: 0;">🔥 <span id="streak-count">0</span></h2>
                    <p style="font-size: 0.875rem; color: var(--text-secondary);">Day Streak</p>
                </div>
            </div>
            
            <div style="margin-top: 1rem;">
                <div style="display: flex; justify-content: space-between;">
                    <span style="font-weight: 500;">Current Phase: <span id="current-phase-name" class="text-gradient">Loading...</span></span>
                    <span id="phase-progress-text">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="phase-progress-bar" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <!-- Insights Panel for Adaptive Replanning -->
        <div id="insights-panel" class="glass-panel insight-panel" style="margin-bottom: 2rem; display: none;">
            <h3 style="color: var(--warning-color); margin-bottom: 0.5rem;">Adaptive Insights</h3>
            <p id="insights-text">Loading insights...</p>
        </div>

        <div class="grid">
            <div class="glass-panel">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Today's Tasks</h2>
                    <div class="loader" id="tasks-loader"></div>
                </div>
                <div id="tasks-list">
                    <!-- Tasks injected here -->
                    <p style="color: var(--text-secondary);">Loading tasks...</p>
                </div>
            </div>

            <div class="glass-panel">
                <h2>Progress Overview</h2>
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
