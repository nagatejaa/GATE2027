<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz & Mistakes - GATE EC 2027 Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">GATE 2027</a>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="plan.html">Plan</a></li>
            <li><a href="quiz.html" class="active">Quiz & Mistakes</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </nav>

    <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Quiz History & Weak Topics</h1>
            <div class="loader" id="quiz-loader"></div>
        </div>

        <div class="grid" style="margin-bottom: 2rem;">
            <div class="glass-panel">
                <h2>Performance Trend</h2>
                <div class="chart-container">
                    <canvas id="scoresChart"></canvas>
                </div>
            </div>
        </div>

        <div class="glass-panel">
            <h2>Mistakes Log</h2>
            <div style="overflow-x: auto;">
                <table id="mistakes-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Subject</th>
                            <th>Question</th>
                            <th>Your Answer</th>
                            <th>Correct</th>
                        </tr>
                    </thead>
                    <tbody id="mistakes-body">
                        <tr><td colspan="5" style="text-align: center; color: var(--text-secondary);">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
